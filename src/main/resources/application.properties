spring.application.name=esiusuarios
server.port=8081

# SQL Server
spring.datasource.url=jdbc:sqlserver://${DB_HOST:localhost}:1433;databaseName=esiusuarios;encrypt=true;trustServerCertificate=true
spring.datasource.username=${DB_USER:sa}
spring.datasource.password=${DB_PASSWORD:TuPasswordAqui}
spring.datasource.driver-class-name=com.microsoft.sqlserver.jdbc.SQLServerDriver

spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.SQLServerDialect
spring.jpa.hibernate.ddl-auto=update
spring.jpa.open-in-view=false
spring.jpa.properties.hibernate.format_sql=true
logging.level.org.hibernate.SQL=DEBUG

# JWT
jwt.secret=${JWT_SECRET:esta-clave-debe-tener-al-menos-32-caracteres-ok}
jwt.expiration-ms=86400000

# Brevo
brevo.api-key=${BREVO_API_KEY:}
brevo.from-email=${BREVO_FROM_EMAIL:noreply@esientradas.com}
brevo.from-name=ESIEntradas

server.error.include-message=always